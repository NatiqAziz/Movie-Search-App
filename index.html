<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="https://cdn-icons-png.flaticon.com/512/4831/4831192.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="nav">
          <h1>Movie Search App</h1>
          <p>
            Discover and explore your favourite movies like never before with
            our intuitive movie
          </p>
          <p id="secondP">Search App, your ultimate cinematic companion</p>
        </div>
        <div class="search">
          <input type="text" placeholder="Type movie name..." />
          <button>Search</button>
        </div>
        <div class="belowSearch">
          <img src="" alt="" />
          <div class="info">
            <h2 id="title"></h2>
            <p id="rating"></p>
            <div class="char">
              <p id="lang"></p>
              <p id="year"></p>
              <p id="runTime"></p>
            </div>
          </div>
        </div>
        <div class="desc">
          <dt>Plot</dt>
          <dd id="plot"></dd>
        </div>
        <div class="cast">
          <dt>Cast</dt>
          <dd id="cast"></dd>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
